name: Feature Request
description: Suggest a new exploit module or feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New exploit module
        - DAG chain improvement
        - CLI enhancement
        - Report/output
        - Other
    validations:
      required: true

  - type: dropdown
    id: attack_phase
    attributes:
      label: "ATT&CK Phase (if exploit module)"
      options:
        - Recon
        - Initial Access
        - Credential Access
        - Execution
        - Persistence
        - Privilege Escalation
        - Lateral Movement
        - Exfiltration
        - Impact
        - N/A

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any references, CVEs, or related information
